name: JARVIS APK Builder
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Jarvis APK
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install --upgrade pip cython virtualenv

      - name: Determine version
        id: version
        run: |
          python ci_version.py --bump ${{ github.event.inputs.bump || 'patch' }}
          echo "version=$(python ci_version.py --get)" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: buildozer android debug 2>&1 | tee build.log

      - name: Find and copy APK
        id: findapk
        run: |
          find . -name "*.apk" 2>/dev/null || true
          find ~/.buildozer -name "*.apk" 2>/dev/null || true
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find ~/.buildozer -name "*.apk" 2>/dev/null | head -1)
          fi
          mkdir -p dist
          if [ -n "$APK" ]; then
            cp "$APK" dist/jarvis-v${{ steps.version.outputs.version }}-debug.apk
            echo "apk_found=true" >> $GITHUB_OUTPUT
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
            tail -50 build.log || true
            exit 1
          fi

      - name: Upload APK artifact
        if: steps.findapk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk-${{ steps.version.outputs.version }}
          path: dist/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: steps.findapk.outputs.apk_found == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: JARVIS v${{ steps.version.outputs.version }}
          body: |
            ## JARVIS APK v${{ steps.version.outputs.version }}
            Auto-built debug APK — ready to install.
            > Enable "Install from unknown sources" on your device before installing.
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "JARVIS Bot"
          git config user.email "jarvis@bot.local"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
